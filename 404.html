<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  // Redireciona para a raiz preservando o path
  // Solução SPA para Cloudflare Pages
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  window.location.replace('/' + (search ? search + '&' : '?') + 'p=' + encodeURIComponent(path + hash));
</script>
</head>
<body>Redirecionando...</body>
</html>
